name: Auto Priority by Label

on:
  issues:
    types: [labeled]

jobs:
  update_project_priority:
    runs-on: ubuntu-latest
    steps:
      - name: Update Project Fields
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PROJECT_NUMBER: 5
          USER_OR_ORG: "em000612"
        run: |
          # 1. Добавляем задачу в проект (если её там нет)
          gh project item-add $PROJECT_NUMBER --owner "$USER_OR_ORG" --url ${{ github.event.issue.html_url }}
          sleep 2
          
          # 2. Получаем внутренний ID карточки
          ITEM_ID=$(gh project item-list $PROJECT_NUMBER --owner "$USER_OR_ORG" --format json | jq -r ".items[] | select(.content.number == ${{ github.event.issue.number }}) | .id")
          
          # 3. Логика для Приоритета
          LABEL_LOWER=$(echo "${{ github.event.label.name }}" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$LABEL_LOWER" == "bug" ]]; then
            gh project item-edit --id "$ITEM_ID" --project-number $PROJECT_NUMBER --owner "$USER_OR_ORG" --field "Priority" --single-select-option "P0"
          elif [[ "$LABEL_LOWER" == "question" ]]; then
            gh project item-edit --id "$ITEM_ID" --project-number $PROJECT_NUMBER --owner "$USER_OR_ORG" --field "Priority" --single-select-option "P1"
          elif [[ "$LABEL_LOWER" == "enhancement" ]]; then
            gh project item-edit --id "$ITEM_ID" --project-number $PROJECT_NUMBER --owner "$USER_OR_ORG" --field "Priority" --single-select-option "P3"
          fi

          # 4. Логика для Итераций (если метка начинается на sprint- или it-)
          if [[ "$LABEL_LOWER" =~ ^(sprint|it|iteration)-([0-9]+)$ ]]; then
            ITER_NUM="${BASH_REMATCH[2]}"
            gh project item-edit --id "$ITEM_ID" --project-number $PROJECT_NUMBER --owner "$USER_OR_ORG" --field "Iteration" --iteration-title "Iteration $ITER_NUM"
          fi
